type: fleet
name: comfyui

# A fleet is the instance pool the task provisions into. dstack 0.20.x won't
# auto-create one for a task run, hence the "no fleets" error — this fixes that.

# Region-agnostic (no network volume): any RunPod region, cheapest GPU wins.
backends: [runpod]

# On-demand only (no spot reclaim mid-generation).
spot_policy: on-demand

# nodes: 0..1 = provision the instance on demand when a run is submitted, and
# scale back to 0 when idle so you don't pay between generations.
nodes: 0..1
idle_duration: 1h

resources:
  # Match the task: CUDA-13-capable architectures only (the cuda13 image needs
  # them), 24GB+ for WAN 14B.
  gpu:
    name: [A40, A100, A5000, L4, L40, L40S, RTX3090, RTX4090, RTX5090, RTXPRO4000, RTXPRO4500, RTXPRO6000]
    memory: 24GB..
  # ~100GB of fp16 models download to ephemeral disk each boot (no volume),
  # plus image + ComfyUI + outputs — must match the task's disk requirement.
  disk: 200GB..
