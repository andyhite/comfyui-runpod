type: task
name: comfyui

# Custom image = RunPod's ComfyUI base + our entrypoint (see Dockerfile).
# Keep this in sync with IMAGE/TAG in the Makefile. If the image is private on
# GHCR, either make the package public or add `registry_auth:` here.
image: ghcr.io/andyhite/comfyui-runpod:latest

# Region-agnostic: no network volume, so dstack picks the cheapest 24-48GB
# GPU anywhere on RunPod, on-demand, under $1.20/hr.
backends: [runpod]
spot_policy: on-demand
max_price: 1.20

# Sync the small declarative bits to the pod on every `apply`. They stage at
# /opt/uploads; the image entrypoint lays them into ComfyUI at boot. Updating
# nodes (snapshot.json), workflows, config, or the model list needs NO rebuild.
files:
  - ./pod/snapshot.json:/opt/uploads/snapshot.json
  - ./pod/user:/opt/uploads/user
  - ./pod/models.txt:/opt/uploads/models.txt

# HF token for gated downloads (Flux.2 Klein 9B). Set it once:
#   dstack secret set HF_TOKEN <your_hf_token>
# and accept the license at huggingface.co/black-forest-labs/FLUX.2-klein-9B.
env:
  - HF_TOKEN=${{ secrets.HF_TOKEN }}

# Web UIs forwarded to localhost:
#   ComfyUI     -> http://localhost:8188
#   JupyterLab  -> http://localhost:8888  (tokenless: JUPYTER_PASSWORD unset)
#   FileBrowser -> http://localhost:8080  (default login admin / adminadmin12)
ports:
  - 8188
  - 8888
  - 8080

resources:
  # WAN 2.2 14B i2v is the binding constraint; Flux.2 Klein 9B fits easily.
  # 24-48GB cards: A40 48GB (~$0.44), A5000 24GB (~$0.27), etc.
  # dstack picks the cheapest match under max_price.
  gpu: 24GB..48GB
  # ~100GB of fp16 models (WAN 14B hi/lo + Klein 9B + encoders) live on
  # ephemeral disk with no volume, so leave headroom for ComfyUI + outputs.
  disk: 200GB..

# Auto-stop the pod if the GPU sits below 10% for a full hour — i.e. you
# finished generating and walked away. The base image won't stop itself
# (ComfyUI is a server, and it stays alive even after a crash), so this is the
# safety net against a forgotten pod billing all weekend. Enforced by the
# in-container runner, so it works on RunPod (unlike fleet idle_duration).
utilization_policy:
  min_gpu_utilization: 10
  time_window: 1h

# No `commands`: the custom image's entrypoint handles populate + snapshot
# restore + workflow/config injection, then execs the base image's /start.sh.

# NOTE: persistence is not wired yet. Without a volume, outputs live on ephemeral
# disk — sync them out (object storage) or download via the UI before `make down`.
